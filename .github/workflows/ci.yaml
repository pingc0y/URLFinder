name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
